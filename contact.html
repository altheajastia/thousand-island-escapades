  <header class="site-header">
 	 <img src="the thousand island escapades.png" alt="Thousand Island Escapades Logo" class="site-logo">
 	 <div class="site-title">
  	  <h1>Thousand Island Escapades</h1>
  	  <p class="tagline">Escape the Ordinary, Discover Extraordinary</p>
  	</div>
		  </header>

  <div class="page-container">

    <aside class="left-sidebar">
      <div class="sidebar-card">
        <div class="sidebar-search">
  <input type="text" placeholder="Search...">
</div>
        <nav>
          <ul>
            <li><a href="index.html">Home</a></li>

        <div class="ad-box">AD</div>
      </div>

    <main class="center-wrapper">
      <section class="contact-form">
        <h2>Contact Us</h2>
        <p>We’d love to hear from you! Fill out the form below and we’ll get back to you soon.</p>

        <form action="#" method="post">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" placeholder="Your full name" required>

          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="Your email address" required>

          <label for="message">Message</label>
          <textarea id="message" name="message" rows="5" placeholder="Write your message here..." required></textarea>

          <button type="submit">Send Message</button>
        </form>
      </section>
    </main>

    <aside class="right-ad">
      <div class="ad-box">AD</div>
    </aside>
  </div>
